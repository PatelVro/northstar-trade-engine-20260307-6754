version: '3.8'

services:
  # Backend service (API and core logic)
  northstar-backend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.backend
      args:
        NORTHSTAR_VERSION: ${NORTHSTAR_VERSION:-dev}
        NORTHSTAR_COMMIT: ${NORTHSTAR_COMMIT:-unknown}
        NORTHSTAR_BUILD_TIME: ${NORTHSTAR_BUILD_TIME:-unknown}
        NORTHSTAR_BUILD_CHANNEL: ${NORTHSTAR_BUILD_CHANNEL:-docker}
        NORTHSTAR_BUILD_DIRTY: ${NORTHSTAR_BUILD_DIRTY:-unknown}
    container_name: northstar-backend
    restart: unless-stopped
    ports:
      - "${NORTHSTAR_BACKEND_PORT:-8080}:8080"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./decision_logs:/app/decision_logs
      - /etc/localtime:/etc/localtime:ro  # Sync host time
    environment:
      - TZ=${NORTHSTAR_TIMEZONE:-America/Toronto}  # Set timezone
    networks:
      - northstar-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend service (static serving and proxy)
  northstar-frontend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.frontend
    container_name: northstar-frontend
    restart: unless-stopped
    ports:
      - "${NORTHSTAR_FRONTEND_PORT:-3000}:80"
    networks:
      - northstar-network
    depends_on:
      - northstar-backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  northstar-network:
    driver: bridge
