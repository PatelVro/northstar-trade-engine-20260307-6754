name: Go Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: go-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    name: Go Test Suite
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Show Go version
        shell: pwsh
        run: go version

      - name: Run green checks
        shell: pwsh
        run: .\tools\run_green_checks.ps1
