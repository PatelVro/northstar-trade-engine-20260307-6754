services:
  ibeam:
    image: voyz/ibeam:latest
    container_name: ibeam_gateway
    env_file:
      - .env.ibkr
    environment:
      - TZ=America/Toronto
    ports:
      - "5002:5002"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import json, subprocess, sys; data = json.loads(subprocess.check_output(['curl','-k','-s','https://localhost:5000/v1/api/iserver/auth/status'], text=True)); sys.exit(0 if data.get('authenticated') and data.get('connected') else 1)\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./ibeam_outputs:/srv/ibeam/outputs
  
  nginx_proxy:
    image: nginx:alpine
    container_name: ibeam_proxy
    network_mode: "service:ibeam"
    volumes:
      - ./nginx_ibeam.conf:/etc/nginx/nginx.conf:ro
      - ./nginx_certs:/etc/nginx/certs:ro
    restart: unless-stopped
